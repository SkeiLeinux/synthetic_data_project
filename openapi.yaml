openapi: 3.1.0
info:
  title: Synthetic Data Generation Service
  version: 1.0.0
  description: |
    REST API для сервиса генерации конфиденциальных синтетических табличных данных
    с применением дифференциальной приватности (DP-CTGAN).

    ## Основной сценарий использования

    1. Загрузить датасет — `POST /datasets`
    2. Загрузить конфигурацию — `POST /configs`
    3. Запустить пайплайн — `POST /runs`
    4. Опрашивать статус — `GET /runs/{run_id}` (или дождаться webhook)
    5. Скачать синтетику — `GET /runs/{run_id}/synthetic`
    6. Изучить отчёт — `GET /runs/{run_id}/report`

    ## Асинхронное выполнение

    Обучение DP-CTGAN занимает несколько минут. Все запуски пайплайна
    (`POST /runs`) возвращают `run_id` немедленно со статусом `queued`.
    Итоговый статус — `completed` | `failed` | `cancelled`.

    ## Авторизация

    Все запросы требуют заголовок `Authorization: Bearer <token>`.
  contact:
    name: Сергей Рогачев
    email: s.rogachev@example.com
  license:
    name: MIT
servers:
- url: http://localhost:8000/api/v1
  description: Локальная разработка
- url: https://synth.internal/api/v1
  description: Внутренний production-стенд
tags:
- name: runs
  description: Запуски пайплайна генерации
- name: synthetic
  description: Синтетические данные конкретного запуска
- name: models
  description: Сохранённые обученные генераторы
- name: configs
  description: Конфигурационные файлы (YAML)
- name: datasets
  description: Исходные датасеты
- name: evaluations
  description: Изолированный запуск оценки приватности / полезности
- name: system
  description: Здоровье сервиса и мониторинг
security:
- BearerAuth: []
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: string
          examples:
          - NOT_FOUND
        message:
          type: string
          examples:
          - Запуск с указанным ID не найден
        details:
          type: object
          additionalProperties: true
    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
          examples:
          - 42
        page:
          type: integer
          examples:
          - 1
        per_page:
          type: integer
          examples:
          - 20
        pages:
          type: integer
          examples:
          - 3
    RunStatus:
      type: string
      enum:
      - queued
      - running
      - completed
      - failed
      - cancelled
      description: |
        - `queued` — задача поставлена в очередь, обучение ещё не началось
        - `running` — пайплайн выполняется
        - `completed` — завершён успешно (вердикт может быть PASS, FAIL или PARTIAL)
        - `failed` — завершён с ошибкой
        - `cancelled` — отменён пользователем
    RunCreate:
      type: object
      required:
      - dataset_name
      - config_name
      properties:
        dataset_name:
          type: string
          description: Имя ранее загруженного датасета
          examples:
          - adult_census
        config_name:
          type: string
          description: Имя ранее загруженной конфигурации
          examples:
          - adult_epsilon3
        save_model:
          type: boolean
          default: false
          description: Сохранить обученную модель в model registry после завершения
        webhook_url:
          type:
          - string
          - 'null'
          format: uri
          description: URL для POST-уведомления при завершении запуска
          examples:
          - https://my-service.internal/hooks/synth-done
        n_synth_rows:
          type:
          - integer
          - 'null'
          minimum: 1
          description: Переопределить количество генерируемых строк (по умолчанию из конфига)
          examples:
          - 10000
    RunSummary:
      type: object
      properties:
        run_id:
          type: string
          format: uuid
          examples:
          - 3fa85f64-5717-4562-b3fc-2c963f66afa6
        status:
          $ref: '#/components/schemas/RunStatus'
        verdict:
          type:
          - string
          - 'null'
          enum:
          - PASS
          - FAIL
          - PARTIAL
          - null
        dataset_name:
          type: string
          examples:
          - adult_census
        config_name:
          type: string
          examples:
          - adult_epsilon3
        created_at:
          type: string
          format: date-time
        started_at:
          type:
          - string
          - 'null'
          format: date-time
        finished_at:
          type:
          - string
          - 'null'
          format: date-time
        duration_sec:
          type:
          - number
          - 'null'
          examples:
          - 183.4
    RunDetail:
      allOf:
      - $ref: '#/components/schemas/RunSummary'
      - type: object
        properties:
          model_id:
            type:
            - string
            - 'null'
            description: ID модели в model registry (если save_model=true)
          synth_rows:
            type:
            - integer
            - 'null'
            description: Количество сгенерированных строк
          config_snapshot:
            type: object
            description: Снимок конфигурации на момент запуска
            additionalProperties: true
          error_message:
            type:
            - string
            - 'null'
            description: Сообщение об ошибке при status=failed
    RunReport:
      type: object
      description: Полный JSON-отчёт, аналогичный файлу из reporter/reports/
      properties:
        report_id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
        generated_at:
          type: string
          format: date-time
        verdict:
          $ref: '#/components/schemas/Verdict'
        data_processing:
          $ref: '#/components/schemas/DataProcessingReport'
        generator:
          $ref: '#/components/schemas/GeneratorReport'
        utility:
          $ref: '#/components/schemas/UtilityReport'
        privacy:
          $ref: '#/components/schemas/PrivacyReport'
    Verdict:
      type: object
      properties:
        overall:
          type: string
          enum:
          - PASS
          - FAIL
          - PARTIAL
        utility_ok:
          type:
          - boolean
          - 'null'
        privacy_ok:
          type:
          - boolean
          - 'null'
        dp_ok:
          type:
          - boolean
          - 'null'
        issues:
          type: array
          items:
            type: string
          examples:
          - - Utility Loss 0.320 > порога 0.150
            - MIA AUC 0.612 > порога 0.550 (риск утечки)
    DataProcessingReport:
      type: object
      properties:
        minimization:
          type: object
          properties:
            removed_direct_identifiers:
              type: array
              items:
                type: string
            removed_high_cardinality:
              type: array
              items:
                type: string
            columns_before:
              type: integer
            columns_after:
              type: integer
            rows_unchanged:
              type: boolean
    GeneratorReport:
      type: object
      properties:
        synthesizer:
          type: string
          examples:
          - smartnoise_dpctgan
        status:
          type: string
          examples:
          - fitted
        dp_config:
          type: object
          properties:
            epsilon_initial:
              type: number
              examples:
              - 3.0
            delta:
              type: number
              examples:
              - 4.47e-05
            sigma:
              type: number
              examples:
              - 5.0
            is_dp_enabled:
              type: boolean
        dp_spent:
          type: object
          properties:
            spent_epsilon_final:
              type:
              - number
              - 'null'
              examples:
              - 2.49
            epochs_requested:
              type: integer
              examples:
              - 300
            epochs_completed:
              type: integer
              examples:
              - 287
    UtilityReport:
      type: object
      properties:
        ml_efficacy:
          type: object
          properties:
            trtr:
              type: object
              properties:
                f1_weighted:
                  type: number
                  examples:
                  - 0.84
            tstr:
              type: object
              properties:
                f1_weighted:
                  type: number
                  examples:
                  - 0.71
            utility_loss:
              type: object
              properties:
                value:
                  type: number
                  examples:
                  - 0.13
        statistical:
          type: object
          properties:
            summary:
              type: object
              properties:
                mean_jsd:
                  type: number
                  examples:
                  - 0.14
                mean_tvd:
                  type: number
                  examples:
                  - 0.21
        correlations:
          type: object
          properties:
            pearson_corr_mae:
              type:
              - number
              - 'null'
              examples:
              - 0.05
    PrivacyReport:
      type: object
      properties:
        empirical_risk:
          type: object
          properties:
            membership_inference:
              type: object
              properties:
                attack_auc:
                  type: number
                  examples:
                  - 0.51
                interpretation:
                  type: string
            distance_metrics:
              type: object
              properties:
                dcr:
                  type: object
                  properties:
                    privacy_preserved:
                      type: boolean
                    synth_to_real:
                      type: object
                      properties:
                        median:
                          type: number
                    holdout_to_real:
                      type: object
                      properties:
                        median:
                          type: number
        diagnostic:
          type: object
          properties:
            classical:
              type: object
              properties:
                k_anonymity:
                  type: integer
                  examples:
                  - 12
                l_diversity:
                  type: integer
                  examples:
                  - 3
                t_closeness:
                  type: number
                  examples:
                  - 0.12
        dp_guarantees:
          type: object
          properties:
            spent_epsilon_final:
              type:
              - number
              - 'null'
            epochs_completed:
              type: integer
    ModelSummary:
      type: object
      properties:
        model_id:
          type: string
          format: uuid
          examples:
          - 7c9e6679-7425-40de-944b-e07fc1f90ae7
        name:
          type: string
          examples:
          - adult_epsilon3_v2
        run_id:
          type:
          - string
          - 'null'
          format: uuid
        dataset_name:
          type: string
          examples:
          - adult_census
        created_at:
          type: string
          format: date-time
        file_size_bytes:
          type: integer
          examples:
          - 4718592
        epsilon:
          type: number
          examples:
          - 3.0
        epochs_completed:
          type: integer
          examples:
          - 287
        spent_epsilon:
          type:
          - number
          - 'null'
          examples:
          - 2.49
    ModelDetail:
      allOf:
      - $ref: '#/components/schemas/ModelSummary'
      - type: object
        properties:
          dp_config:
            $ref: '#/components/schemas/GeneratorReport/properties/dp_config'
          dp_spent:
            $ref: '#/components/schemas/GeneratorReport/properties/dp_spent'
          sample_size:
            type: integer
            description: Размер обучающей выборки
            examples:
            - 39073
    SampleRequest:
      type: object
      required:
      - n_rows
      properties:
        n_rows:
          type: integer
          minimum: 1
          maximum: 1000000
          examples:
          - 5000
        output_format:
          type: string
          enum:
          - csv
          - json
          - parquet
          default: csv
    ConfigSummary:
      type: object
      properties:
        name:
          type: string
          examples:
          - adult_epsilon3
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        dataset_name:
          type:
          - string
          - 'null'
          description: Датасет, для которого предназначен конфиг
        epsilon:
          type: number
          examples:
          - 3.0
        epochs:
          type: integer
          examples:
          - 300
    ConfigValidationResult:
      type: object
      properties:
        valid:
          type: boolean
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                examples:
                - generator.epsilon
              message:
                type: string
                examples:
                - epsilon должен быть > 0
          description: Пустой массив если valid=true
        warnings:
          type: array
          items:
            type: string
          description: Некритичные предупреждения (например, preprocessor_eps близко к epsilon)
          examples:
          - - preprocessor_eps занимает >30% от epsilon — останется мало бюджета на обучение
    DatasetSummary:
      type: object
      properties:
        name:
          type: string
          examples:
          - adult_census
        uploaded_at:
          type: string
          format: date-time
        rows:
          type: integer
          examples:
          - 48842
        columns:
          type: integer
          examples:
          - 15
        file_size_bytes:
          type: integer
          examples:
          - 3981312
    DatasetSchema:
      type: object
      properties:
        categorical:
          type: array
          items:
            type: string
          examples:
          - - workclass
            - education
            - occupation
            - income
        continuous:
          type: array
          items:
            type: string
          examples:
          - - age
            - hours-per-week
            - capital-gain
        ignored:
          type: array
          items:
            type: string
          examples:
          - - fnlwgt
        detected_at:
          type: string
          format: date-time
    DatasetPreview:
      type: object
      properties:
        columns:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
        stats:
          type: object
          description: Базовая описательная статистика по каждой колонке
          additionalProperties:
            type: object
            properties:
              dtype:
                type: string
              null_count:
                type: integer
              unique_count:
                type: integer
              mean:
                type:
                - number
                - 'null'
              min:
                type:
                - string
                - 'null'
              max:
                type:
                - string
                - 'null'
    EvaluationRequest:
      type: object
      required:
      - real_dataset_name
      - synth_run_id
      properties:
        real_dataset_name:
          type: string
          description: Имя датасета с реальными данными
          examples:
          - adult_census
        synth_run_id:
          type: string
          format: uuid
          description: run_id, из которого берётся синтетика
        quasi_identifiers:
          type: array
          items:
            type: string
          description: Переопределить квази-идентификаторы (по умолчанию из конфига запуска)
          examples:
          - - age
            - education
            - occupation
            - sex
        sensitive_attribute:
          type:
          - string
          - 'null'
          examples:
          - income
        target_column:
          type: string
          description: Целевая колонка для ML-оценки (обязательна для utility)
          examples:
          - income
    EvaluationResult:
      type: object
      properties:
        evaluation_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - queued
          - running
          - completed
          - failed
        created_at:
          type: string
          format: date-time
        finished_at:
          type:
          - string
          - 'null'
          format: date-time
        report:
          oneOf:
          - $ref: '#/components/schemas/PrivacyReport'
          - $ref: '#/components/schemas/UtilityReport'
          type: 'null'
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum:
          - ok
          - degraded
          - unavailable
        version:
          type: string
          examples:
          - 1.0.0
        uptime_sec:
          type: integer
          examples:
          - 86400
    ComponentHealth:
      type: object
      properties:
        component:
          type: string
          examples:
          - database
        status:
          type: string
          enum:
          - ok
          - unavailable
        latency_ms:
          type:
          - integer
          - 'null'
          examples:
          - 3
        message:
          type:
          - string
          - 'null'
  parameters:
    RunId:
      name: run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Уникальный идентификатор запуска
    ModelId:
      name: model_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Уникальный идентификатор модели
    ConfigName:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Имя конфигурации (без расширения .yaml)
      examples:
        default:
          value: adult_epsilon3
    DatasetName:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Имя датасета
      examples:
        default:
          value: adult_census
    EvaluationId:
      name: evaluation_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
  responses:
    BadRequest:
      description: Невалидный запрос (ошибка валидации входных данных)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            default:
              value:
                code: VALIDATION_ERROR
                message: n_rows должен быть > 0
    Unauthorized:
      description: Отсутствует или невалиден токен авторизации
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            default:
              value:
                code: UNAUTHORIZED
                message: Bearer token обязателен
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            default:
              value:
                code: NOT_FOUND
                message: Запуск не найден
    Conflict:
      description: Конфликт состояния (например, попытка удалить работающий запуск)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            default:
              value:
                code: CONFLICT
                message: Нельзя удалить запуск со статусом running
    UnprocessableEntity:
      description: Семантически невалидный запрос
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
paths:
  /runs:
    get:
      tags:
      - runs
      summary: Список запусков
      description: Возвращает список всех запусков пайплайна с пагинацией. Можно фильтровать по статусу и вердикту.
      operationId: listRuns
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      - name: status
        in: query
        schema:
          $ref: '#/components/schemas/RunStatus'
        description: Фильтр по статусу
      - name: verdict
        in: query
        schema:
          type: string
          enum:
          - PASS
          - FAIL
          - PARTIAL
        description: Фильтр по вердикту (только для завершённых)
      - name: dataset_name
        in: query
        schema:
          type: string
        description: Фильтр по датасету
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/RunSummary'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
      - runs
      summary: Запустить пайплайн
      description: |
        Создаёт новый запуск пайплайна и ставит его в очередь.
        Возвращает `run_id` немедленно — обучение выполняется асинхронно.
        Опрашивайте `GET /runs/{run_id}` для отслеживания прогресса,
        или укажите `webhook_url` для push-уведомления при завершении.
      operationId: createRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunCreate'
            examples:
              default:
                value:
                  dataset_name: adult_census
                  config_name: adult_epsilon3
                  save_model: true
                  webhook_url: https://my-service.internal/hooks/synth-done
      responses:
        '202':
          description: Запуск поставлен в очередь
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunSummary'
              examples:
                default:
                  value:
                    run_id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                    status: queued
                    verdict: null
                    dataset_name: adult_census
                    config_name: adult_epsilon3
                    created_at: '2026-04-09T12:00:00Z'
                    started_at: null
                    finished_at: null
                    duration_sec: null
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Датасет или конфиг не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                default:
                  value:
                    code: NOT_FOUND
                    message: Датасет 'adult_census' не найден. Сначала загрузите его через POST /datasets
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /runs/{run_id}:
    get:
      tags:
      - runs
      summary: Статус и детали запуска
      operationId: getRun
      parameters:
      - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
      - runs
      summary: Отменить или удалить запуск
      description: |
        Если статус `queued` или `running` — отменяет выполнение.
        Если `completed` или `failed` — удаляет запись и связанные файлы (синтетику, отчёт).
        Модель в registry при этом **не** удаляется.
      operationId: deleteRun
      parameters:
      - $ref: '#/components/parameters/RunId'
      responses:
        '204':
          description: Успешно удалён / отменён
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /runs/{run_id}/report:
    get:
      tags:
      - runs
      summary: Получить отчёт о запуске
      description: Возвращает полный JSON-отчёт с вердиктом, метриками полезности и приватности. Доступен только для завершённых
        запусков.
      operationId: getRunReport
      parameters:
      - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunReport'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Запуск ещё не завершён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                default:
                  value:
                    code: RUN_NOT_FINISHED
                    message: 'Отчёт недоступен — запуск ещё выполняется (status: running)'
  /runs/{run_id}/logs:
    get:
      tags:
      - runs
      summary: Получить лог запуска
      operationId: getRunLogs
      parameters:
      - $ref: '#/components/parameters/RunId'
      - name: tail
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 10000
        description: Вернуть только последние N строк (по умолчанию — весь лог)
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
              examples:
                default:
                  value: |
                    [INFO] Загрузка конфига: configs/adult.yaml
                    [INFO] Загружено строк: 48842
                    [INFO] Обучение генератора на real_train...
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /runs/{run_id}/synthetic:
    get:
      tags:
      - synthetic
      summary: Скачать синтетику запуска
      description: Возвращает сгенерированный датасет в указанном формате. Доступен только для завершённых запусков.
      operationId: getRunSynthetic
      parameters:
      - $ref: '#/components/parameters/RunId'
      - name: format
        in: query
        schema:
          type: string
          enum:
          - csv
          - json
          - parquet
          default: csv
      responses:
        '200':
          description: Файл синтетических данных
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
            application/octet-stream:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              schema:
                type: string
              examples:
                default:
                  value: attachment; filename="adult_census__dpctgan__20260409.csv"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Запуск ещё не завершён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
      - synthetic
      summary: Догенерировать строки из модели запуска
      description: |
        Генерирует дополнительные строки с использованием модели этого запуска
        без повторного обучения. Требует `save_model: true` при создании запуска.
        Не тратит дополнительный ε-бюджет.
      operationId: generateMoreSynthetic
      parameters:
      - $ref: '#/components/parameters/RunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SampleRequest'
            examples:
              default:
                value:
                  n_rows: 5000
                  output_format: csv
      responses:
        '200':
          description: Файл дополнительной синтетики
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Модель не была сохранена для этого запуска
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                default:
                  value:
                    code: MODEL_NOT_SAVED
                    message: 'Модель не сохранена. Повторите запуск с save_model: true'
  /models:
    get:
      tags:
      - models
      summary: Список сохранённых моделей
      operationId: listModels
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      - name: dataset_name
        in: query
        schema:
          type: string
        description: Фильтр по датасету
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ModelSummary'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /models/{model_id}:
    get:
      tags:
      - models
      summary: Метаданные модели
      description: Возвращает конфигурацию и DP-отчёт сохранённой модели без самих весов.
      operationId: getModel
      parameters:
      - $ref: '#/components/parameters/ModelId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
      - models
      summary: Удалить модель
      description: Удаляет .pkl-файл и запись в registry. Синтетика, сгенерированная ранее, сохраняется.
      operationId: deleteModel
      parameters:
      - $ref: '#/components/parameters/ModelId'
      responses:
        '204':
          description: Модель удалена
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /models/{model_id}/samples:
    post:
      tags:
      - models
      summary: Сгенерировать синтетику из модели
      description: |
        Генерирует синтетические строки из сохранённой модели без пайплайна.
        Обучение не запускается. Оценка приватности и полезности не производится.
        Используйте для быстрого получения синтетики из уже проверенной модели.
      operationId: sampleFromModel
      parameters:
      - $ref: '#/components/parameters/ModelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SampleRequest'
            examples:
              default:
                value:
                  n_rows: 10000
                  output_format: csv
      responses:
        '200':
          description: Файл синтетических данных
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /configs:
    get:
      tags:
      - configs
      summary: Список конфигураций
      operationId: listConfigs
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConfigSummary'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
      - configs
      summary: Загрузить конфигурацию
      description: Принимает YAML-файл, валидирует его и сохраняет под указанным именем.
      operationId: createConfig
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - name
              - file
              properties:
                name:
                  type: string
                  description: Имя конфига (без .yaml)
                  examples:
                  - adult_epsilon3
                file:
                  type: string
                  format: binary
                  description: YAML-файл конфигурации
      responses:
        '201':
          description: Конфиг создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigSummary'
        '400':
          description: Невалидный YAML или ошибка валидации конфига
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigValidationResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Конфиг с таким именем уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /configs/validate:
    post:
      tags:
      - configs
      summary: Валидировать конфигурацию
      description: Проверяет YAML на корректность без сохранения. Аналог `cli.py --check`.
      operationId: validateConfig
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
              properties:
                file:
                  type: string
                  format: binary
          application/x-yaml:
            schema:
              type: string
      responses:
        '200':
          description: Результат валидации (valid может быть false — это не ошибка HTTP)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigValidationResult'
              examples:
                valid:
                  summary: Конфиг валиден
                  value:
                    valid: true
                    errors: []
                    warnings:
                    - preprocessor_eps занимает >30% от epsilon
                invalid:
                  summary: Конфиг невалиден
                  value:
                    valid: false
                    errors:
                    - field: generator.epsilon
                      message: epsilon должен быть > 0
                    warnings: []
        '401':
          $ref: '#/components/responses/Unauthorized'
  /configs/{name}:
    get:
      tags:
      - configs
      summary: Получить конфигурацию
      operationId: getConfig
      parameters:
      - $ref: '#/components/parameters/ConfigName'
      responses:
        '200':
          description: OK
          content:
            application/x-yaml:
              schema:
                type: string
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
      - configs
      summary: Заменить конфигурацию
      description: Полностью заменяет существующий конфиг. Валидирует перед сохранением.
      operationId: replaceConfig
      parameters:
      - $ref: '#/components/parameters/ConfigName'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Конфиг обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigSummary'
        '400':
          description: Ошибка валидации нового конфига
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigValidationResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
      - configs
      summary: Удалить конфигурацию
      operationId: deleteConfig
      parameters:
      - $ref: '#/components/parameters/ConfigName'
      responses:
        '204':
          description: Конфиг удалён
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Конфиг используется в активном запуске
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                default:
                  value:
                    code: CONFIG_IN_USE
                    message: Конфиг используется в запуске 3fa85f64-...
  /datasets:
    get:
      tags:
      - datasets
      summary: Список датасетов
      operationId: listDatasets
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/DatasetSummary'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
      - datasets
      summary: Загрузить датасет
      description: |
        Принимает CSV-файл, вычисляет базовую статистику и сохраняет.
        Автодетекция схемы колонок запускается асинхронно после загрузки.
      operationId: uploadDataset
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - name
              - file
              properties:
                name:
                  type: string
                  description: Имя датасета (уникальное)
                  examples:
                  - adult_census
                file:
                  type: string
                  format: binary
                  description: CSV-файл
                na_values:
                  type: string
                  description: Разделённые запятой значения, трактуемые как NaN
                  examples:
                  - ?,NA,N/A
      responses:
        '201':
          description: Датасет загружен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Датасет с таким именем уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /datasets/{name}:
    delete:
      tags:
      - datasets
      summary: Удалить датасет
      operationId: deleteDataset
      parameters:
      - $ref: '#/components/parameters/DatasetName'
      responses:
        '204':
          description: Датасет удалён
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Датасет используется в активном запуске
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /datasets/{name}/schema:
    get:
      tags:
      - datasets
      summary: Автодетектированная схема колонок
      description: |
        Возвращает результат `DataProcessor.detect_column_types()`:
        разбивку колонок на categorical / continuous / ignored.
        Используйте как основу для составления конфига.
      operationId: getDatasetSchema
      parameters:
      - $ref: '#/components/parameters/DatasetName'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetSchema'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /datasets/{name}/preview:
    post:
      tags:
      - datasets
      summary: Предпросмотр и статистика датасета
      operationId: previewDataset
      parameters:
      - $ref: '#/components/parameters/DatasetName'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                n_rows:
                  type: integer
                  default: 10
                  minimum: 1
                  maximum: 1000
                  description: Количество строк для предпросмотра
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetPreview'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /evaluations/privacy:
    post:
      tags:
      - evaluations
      summary: Запустить оценку приватности
      description: |
        Изолированный запуск `PrivacyEvaluator` поверх уже существующей синтетики.
        Полезно для повторной оценки с другими квази-идентификаторами
        или для сравнения синтетик от разных моделей.
        Выполняется асинхронно — возвращает `evaluation_id`.
      operationId: evaluatePrivacy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluationRequest'
      responses:
        '202':
          description: Оценка поставлена в очередь
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /evaluations/utility:
    post:
      tags:
      - evaluations
      summary: Запустить оценку полезности
      description: |
        Изолированный запуск `UtilityEvaluator`. Требует указать `target_column`.
      operationId: evaluateUtility
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/EvaluationRequest'
              - type: object
                required:
                - target_column
      responses:
        '202':
          description: Оценка поставлена в очередь
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /evaluations/{evaluation_id}:
    get:
      tags:
      - evaluations
      summary: Результат оценки
      operationId: getEvaluation
      parameters:
      - $ref: '#/components/parameters/EvaluationId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /health:
    get:
      tags:
      - system
      summary: Liveness check
      description: Проверяет, что сервис жив и отвечает. Не требует авторизации. Используется load balancer'ом.
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: Сервис работает
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                default:
                  value:
                    status: ok
                    version: 1.0.0
                    uptime_sec: 86400
        '503':
          description: Сервис недоступен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                default:
                  value:
                    status: unavailable
                    version: 1.0.0
                    uptime_sec: 0
  /health/db:
    get:
      tags:
      - system
      summary: Readiness check — БД
      description: Проверяет доступность PostgreSQL. Используется для readiness probe в Kubernetes.
      operationId: healthDb
      security: []
      responses:
        '200':
          description: БД доступна
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComponentHealth'
              examples:
                default:
                  value:
                    component: database
                    status: ok
                    latency_ms: 3
                    message: null
        '503':
          description: БД недоступна
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComponentHealth'
              examples:
                default:
                  value:
                    component: database
                    status: unavailable
                    latency_ms: null
                    message: connection refused
  /health/gpu:
    get:
      tags:
      - system
      summary: Readiness check — GPU
      description: 'Проверяет доступность GPU (CUDA). Возвращает 200 даже если GPU отсутствует — просто `status: unavailable`.'
      operationId: healthGpu
      security: []
      responses:
        '200':
          description: Статус GPU
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ComponentHealth'
                - type: object
                  properties:
                    device_name:
                      type:
                      - string
                      - 'null'
                      examples:
                      - NVIDIA GeForce RTX 3080
                    vram_total_mb:
                      type:
                      - integer
                      - 'null'
                      examples:
                      - 10240
                    vram_free_mb:
                      type:
                      - integer
                      - 'null'
                      examples:
                      - 8192
  /metrics:
    get:
      tags:
      - system
      summary: Prometheus-метрики
      description: |
        Метрики в формате Prometheus text exposition.
        Scrape-endpoint для Prometheus / Grafana.

        Экспортируемые метрики:
        - `synth_runs_total{status, verdict}` — счётчик запусков
        - `synth_run_duration_seconds` — гистограмма длительности
        - `synth_epsilon_spent` — гистограмма потраченного ε
        - `synth_utility_loss` — гистограмма utility loss
        - `synth_mia_auc` — гистограмма MIA AUC
        - `synth_queue_size` — текущий размер очереди задач
      operationId: getMetrics
      security: []
      responses:
        '200':
          description: Метрики в формате Prometheus
          content:
            text/plain:
              schema:
                type: string
              examples:
                default:
                  value: |
                    # HELP synth_runs_total Total pipeline runs
                    # TYPE synth_runs_total counter
                    synth_runs_total{status="completed",verdict="PASS"} 17
                    synth_runs_total{status="completed",verdict="FAIL"} 4
                    synth_runs_total{status="failed"} 1
                    # HELP synth_run_duration_seconds Pipeline run duration
                    # TYPE synth_run_duration_seconds histogram
                    synth_run_duration_seconds_bucket{le="60"} 0
                    synth_run_duration_seconds_bucket{le="300"} 12
