[PATHS]
config_rout = config.ini
raw_data_file = adult.csv
logs_rout = logs/app.log

[DATABASE]
host = localhost
port = 5432
dbname = synthetic_data_db
user = postgres
password = 111
schema = synthetic_data_schema

[QUERIES]
test_query = SELECT 1;
raw_data_query = SELECT * FROM synthetic_data_schema.raw_data;

[PIPELINE]
dataset_name = adult_census
data_path = data/adult.csv
sample_size = 30000          ; 0 = взять все строки
output_dir = reporter/reports
run_preprocessing = true
ffffffffffffff

[GENERATOR]
config_json = {
  "epsilon": 3.0,
  "preprocessor_eps": 0.5,
  "delta": null,
  "sigma": 5.0,
  "max_per_sample_grad_norm": 1.0,
  "epochs": 300,
  "batch_size": 100,
  "discriminator_steps": 1,
  "pac": 1,
  "embedding_dim": 128,
  "generator_dim": [256, 256],
  "discriminator_dim": [256, 256],
  "generator_lr": 0.0002,
  "generator_decay": 1e-6,
  "discriminator_lr": 0.0002,
  "discriminator_decay": 1e-6,
  "cuda": true,
  "verbose": true,
  "disabled_dp": false,
  "loss": "cross_entropy",
  "nullable": false,
  "random_seed": 42
}

[UTILITY]
config_json = {
  "target_column": "income",
  "task_type": "classification",
  "drop_columns": ["fnlwgt"],
  "random_state": 42
}

[PRIVACY]
config_json = {
  "quasi_identifiers": ["age", "education", "occupation", "sex", "race"],
  "sensitive_attribute": "income",
  "compute_classical": true,
  "compute_distance": true,
  "compute_mia": true,
  "distance_sample_size": 1000,
  "mia_sample_size": 500
}

[DATA_SCHEMA]
columns_categorical = [
  "workclass", "education", "marital-status", "occupation",
  "relationship", "race", "sex", "native-country", "income"
]
columns_continuous = [
  "age", "fnlwgt", "education-num",
  "capital-gain", "capital-loss", "hours-per-week"
]
