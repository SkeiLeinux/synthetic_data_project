[PATHS]
config_rout = config.ini
logs_rout = logs/app.log

; ─── Внутренняя БД сервиса (System Storage) ───────────────────────────────
; Используется ProcessRegistry для хранения процессов, логов и метаданных.
; Инициализируется через db/init_db.sql.
[DATABASE]
host = localhost
port = 5432
dbname = synthetic_data_db
user = postgres
password = 111
schema = synthetic_data_schema

; ─── Источник данных компании (Data Storage — чтение) ─────────────────────
; Используется DataIO.load_from_db().
; Если данные загружаются из CSV — эту секцию можно не заполнять.
[DATA_SOURCE]
host = localhost
port = 5432
dbname = company_data_db
user = postgres
password = 111

; ─── Целевое хранилище синтетики (Data Storage — запись) ──────────────────
; Используется DataIO.save_to_db().
; Если синтетика сохраняется в CSV — эту секцию можно не заполнять.
[DATA_TARGET]
host = localhost
port = 5432
dbname = company_data_db
user = postgres
password = 111

[PIPELINE]
dataset_name = adult_census
data_path = data/adult.csv
sample_size = 0          ; 0 = взять все строки
output_dir = reporter/reports
run_preprocessing = true

[GENERATOR]
config_json = {
  "epsilon": 3.0,
  "preprocessor_eps": 0.5,
  "delta": null,
  "sigma": 5.0,
  "max_per_sample_grad_norm": 1.0,
  "epochs": 300,
  "batch_size": 500,
  "discriminator_steps": 1,
  "pac": 1,
  "embedding_dim": 128,
  "generator_dim": [256, 256],
  "discriminator_dim": [256, 256],
  "generator_lr": 0.0002,
  "generator_decay": 1e-6,
  "discriminator_lr": 0.0002,
  "discriminator_decay": 1e-6,
  "cuda": true,
  "verbose": true,
  "disabled_dp": false,
  "loss": "cross_entropy",
  "nullable": false,
  "random_seed": 42
}

[UTILITY]
config_json = {
  "target_column": "income",
  "task_type": "classification",
  "drop_columns": ["fnlwgt"],
  "random_state": 42
}

[PRIVACY]
config_json = {
  "quasi_identifiers": ["age", "education", "occupation", "sex", "race"],
  "sensitive_attribute": "income",
  "compute_classical": true,
  "compute_distance": true,
  "compute_mia": true,
  "distance_sample_size": 2000,
  "mia_sample_size": 1000
}

[DATA_SCHEMA]
columns_categorical = [
  "workclass", "education", "marital-status", "occupation",
  "relationship", "race", "sex", "native-country", "income"
]
columns_continuous = [
  "age", "fnlwgt", "education-num",
  "capital-gain", "capital-loss", "hours-per-week"
]